<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rosetta Interactive Chart</title>
    <!-- D3.js v7 — local copy (CDN is blocked inside Streamlit iframes) -->
    <script src="d3.v7.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* Fallback error/debug display */
        #debug-panel {
            font-family: monospace;
            font-size: 12px;
            color: #ff6b6b;
            background: #1a1a2e;
            padding: 12px;
            margin: 8px;
            border-radius: 6px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        #debug-panel.visible {
            display: block;
        }

        #debug-panel .dbg-ok {
            color: #6bff6b;
        }

        #debug-panel .dbg-warn {
            color: #ffcc00;
        }
    </style>
</head>

<body>
    <div id="chart-container"></div>
    <div id="tooltip" class="tooltip hidden"></div>
    <div id="debug-panel"></div>

    <!-- Streamlit component messaging library (inline) -->
    <script>
        // ── Debug helper ─────────────────────────────────────────────────
        const _dbg = {
            el: null,
            init() { this.el = document.getElementById("debug-panel"); },
            log(msg, cls) {
                if (!this.el) this.init();
                const d = document.createElement("div");
                d.className = cls || "";
                d.textContent = msg;
                this.el.appendChild(d);
                this.el.classList.add("visible");
                console.log("[RosettaChart]", msg);
            },
            ok(msg) { this.log("✓ " + msg, "dbg-ok"); },
            warn(msg) { this.log("⚠ " + msg, "dbg-warn"); },
            err(msg) { this.log("✗ " + msg, ""); },
            clear() {
                if (!this.el) this.init();
                this.el.innerHTML = "";
                this.el.classList.remove("visible");
            },
        };

        // ── Streamlit component communication layer ──────────────────────
        // Implements the Streamlit component-lib protocol for static mode.
        const Streamlit = {
            _isReady: false,
            _lastFrameHeight: 0,
            _renderHandler: null,

            setComponentReady() {
                this._isReady = true;
                window.parent.postMessage(
                    { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
                    "*"
                );
            },

            setFrameHeight(height) {
                if (height === undefined) {
                    height = document.body.scrollHeight || document.documentElement.scrollHeight || 100;
                }
                if (height === this._lastFrameHeight) return;
                this._lastFrameHeight = height;
                window.parent.postMessage(
                    { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: height },
                    "*"
                );
            },

            setComponentValue(value) {
                window.parent.postMessage(
                    { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value },
                    "*"
                );
            },

            onRender(callback) {
                this._renderHandler = callback;
            },

            _handleMessage(event) {
                const msg = event.data;
                if (!msg) return;
                // Streamlit sends messages with type "streamlit:render"
                const msgType = msg.type;
                if (msgType !== "streamlit:render") return;
                try {
                    if (this._renderHandler) {
                        this._renderHandler(msg);
                    }
                } catch (e) {
                    _dbg.err("Render handler error: " + e.message);
                    _dbg.err("Stack: " + (e.stack || "").split("\n").slice(0, 3).join(" | "));
                }
            },
        };

        window.addEventListener("message", (e) => Streamlit._handleMessage(e));

        // ── Global error catcher ─────────────────────────────────────────
        window.onerror = function (msg, url, line, col, err) {
            _dbg.err("JS Error: " + msg + " at " + (url || "?") + ":" + line);
        };
    </script>

    <script src="chart_renderer.js"></script>
    <script src="tooltip.js"></script>

    <script>
        // ── Preflight checks ─────────────────────────────────────────────
        (function preflight() {
            if (typeof d3 === "undefined") {
                _dbg.err("D3.js failed to load — chart cannot render");
                return;
            }
            if (typeof RosettaChart === "undefined") {
                _dbg.err("chart_renderer.js failed to load");
                return;
            }
            if (typeof RosettaTooltip === "undefined") {
                _dbg.warn("tooltip.js failed to load — tooltips disabled");
            }
        })();

        // ── Main entry point ─────────────────────────────────────────────
        Streamlit.onRender((event) => {
            _dbg.clear();

            // Streamlit sends args at event.args
            const args = event.args;
            if (!args) {
                _dbg.err("No args received from Streamlit");
                Streamlit.setFrameHeight(40);
                return;
            }

            const data = args.chart_data;
            if (!data) {
                _dbg.err("No chart_data in args. Keys received: " + Object.keys(args).join(", "));
                Streamlit.setFrameHeight(40);
                return;
            }

            if (typeof d3 === "undefined") {
                _dbg.err("D3.js is not available");
                Streamlit.setFrameHeight(40);
                return;
            }

            // Clear previous chart
            const container = document.getElementById("chart-container");
            container.innerHTML = "";

            // Apply theme
            const darkMode = data.config && data.config.dark_mode;
            document.body.classList.toggle("dark-mode", !!darkMode);

            // Render chart
            const width = args.chart_width || 600;
            const height = args.chart_height || 600;

            try {
                // Check if this is a biwheel chart
                const isBiwheel = data.config && data.config.is_biwheel;
                if (isBiwheel) {
                    RosettaChart.renderBiwheel(container, data, width, height);
                } else {
                    RosettaChart.render(container, data, width, height);
                }
            } catch (e) {
                _dbg.err("RosettaChart.render() threw: " + e.message);
                _dbg.err("Stack: " + (e.stack || "").split("\n").slice(0, 5).join(" | "));
                Streamlit.setFrameHeight(120);
                return;
            }

            // Wire tooltips
            try {
                if (typeof RosettaTooltip !== "undefined") {
                    const svgEl = container.querySelector("svg");
                    if (svgEl) {
                        RosettaTooltip.wire(d3.select(svgEl), data);
                    }
                }
            } catch (e) {
                _dbg.warn("Tooltip wiring failed: " + e.message);
            }

            // Set frame height
            Streamlit.setFrameHeight(height + 10);
        });

        // Signal ready — must be called AFTER registering the render handler
        Streamlit.setComponentReady();
        Streamlit.setFrameHeight(100);
    </script>
</body>

</html>
